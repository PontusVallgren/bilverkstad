<header class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
        [ngClass]="scrolled() ? 'bg-gray-900/95 backdrop-blur-sm shadow-lg' : 'bg-gradient-to-b from-gray-900/90 to-transparent'">
  <div class="container mx-auto px-4 py-4 flex items-center justify-between">

    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-3">
      <div class="flex flex-col">
        <span class="text-white font-bold text-lg tracking-tight leading-none">BILVERKSTAN</span>
        <span class="text-gray-200 text-xs font-medium">ÄLVSBACKA AB</span>
      </div>
    </a>

    <!-- Desktop Nav -->
    <nav class="hidden lg:flex items-center gap-8">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          [routerLinkActiveOptions]="{ exact: link.exact }"
          routerLinkActive="!text-white"
          class="text-sm font-medium transition-colors relative group text-gray-200 hover:text-white">
          {{ link.label }}
          <span class="absolute -bottom-1 left-0 h-0.5 bg-red-600 transition-all duration-300 w-0 group-hover:w-full"></span>
        </a>
      }
    </nav>

    <!-- CTA Phone Button -->
    <div class="hidden lg:flex items-center">
      <a href="tel:091010016"
         class="flex items-center h-9 py-2 bg-red-600 hover:bg-red-700 text-white rounded-full px-6 shadow-lg hover:shadow-xl transition-all duration-300 text-sm font-medium">
        <lucide-icon [img]="Phone" class="w-4 h-4 mr-2"></lucide-icon>
        0910-100 16
      </a>
    </div>

    <!-- Mobile Hamburger -->
    <button (click)="toggleMenu()" class="lg:hidden p-2 rounded-lg transition-colors text-white">
      @if (mobileOpen()) {
        <lucide-icon [img]="X" class="w-6 h-6"></lucide-icon>
      } @else {
        <lucide-icon [img]="Menu" class="w-6 h-6"></lucide-icon>
      }
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (mobileOpen()) {
    <div class="lg:hidden bg-gray-900/95 backdrop-blur-sm px-4 pb-4 flex flex-col gap-3">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          [routerLinkActiveOptions]="{ exact: link.exact }"
          routerLinkActive="text-red-500"
          (click)="toggleMenu()"
          class="text-gray-200 hover:text-white py-2 text-sm font-medium border-b border-gray-700/50">
          {{ link.label }}
        </a>
      }
      <a href="tel:091010016"
         class="flex items-center justify-center bg-red-600 hover:bg-red-700 text-white rounded-full px-6 py-3 mt-2 transition-all duration-300 text-sm font-medium">
        <lucide-icon [img]="Phone" class="w-4 h-4 mr-2"></lucide-icon>
        0910-100 16
      </a>
    </div>
  }
</header>
